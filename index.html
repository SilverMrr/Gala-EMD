<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>galaemd.fr — compte à rebours</title>
  <meta name="description" content="Un compte à rebours. Rien d’autre. #GalaEMD" />
  <meta property="og:title" content="galaemd.fr — compte à rebours" />
  <meta property="og:description" content="Un compte à rebours. Rien d’autre. #GalaEMD" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#0a0a0a" />
  <style>
    :root{
      --bg:#0a0a0a;
      --fg:#f6f6f6;
      --muted:#bdbdbd;
      --accent:#d6c68b;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }
    .stage{position:relative; height:100%; width:100%; display:grid; place-items:center}

    .bg{position:absolute; inset:0; overflow:hidden; z-index:0}
    .g1, .g2, .g3{position:absolute; inset:-20%}
    .g1{background:radial-gradient(1200px 1200px at 70% 30%, rgba(214,198,139,.08), transparent 60%)}
    .g2{background:radial-gradient(1000px 1000px at 20% 70%, rgba(255,255,255,.05), transparent 55%)}
    .g3{background:conic-gradient(from 120deg, rgba(255,255,255,.02), transparent 25%, rgba(214,198,139,.035) 35%, transparent 55%, rgba(255,255,255,.02) 70%, transparent)}
    .noise{position:absolute; inset:-10%; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.035"/></svg>'); mix-blend-mode:overlay; opacity:.3; animation: drift 30s linear infinite alternate}
    @keyframes drift{to{transform:translate3d(2%, -2%,0)}}

    .grid::before, .grid::after{content:""; position:absolute; inset:0; background-size: 48px 48px; opacity:.06;}
    .grid::before{background-image:linear-gradient(to right, rgba(255,255,255,.12) 1px, transparent 1px)}
    .grid::after{background-image:linear-gradient(to bottom, rgba(255,255,255,.12) 1px, transparent 1px)}

    .wrap{position:relative; z-index:1; display:grid; gap:2rem; place-items:center; padding:2rem}

    .count{font-variant-numeric:tabular-nums slashed-zero; line-height:0.95; text-align:center;
      font-weight:500; letter-spacing:.02em;
      font-size: clamp(2.2rem, 4.2vw + 1rem, 12rem);
      text-shadow: 0 0 40px rgba(214,198,139,.08);
    }
    .count .unit{display:block; font-size: clamp(.75rem, .6rem + .6vw, 1.05rem); color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-top:.6rem}

    .fab{
      position:fixed; right:16px; bottom:16px; z-index:2;
      width:42px; height:42px; border-radius:999px;
      display:grid; place-items:center; cursor:pointer;
      color:var(--fg); border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      backdrop-filter: blur(4px);
      transition: transform .15s ease, border-color .2s ease, box-shadow .3s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    .fab:hover{ transform: translateY(-1px); border-color: rgba(214,198,139,.45) }

    .modal{$1background:#000; z-index:10}
    .modal[open]{display:grid}
    .card{
      width:min(520px, 92vw); border-radius:20px; padding:1rem; border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(180deg, #1b1b1b, #121212);
      box-shadow:0 30px 120px rgba(0,0,0,.6);
    }
    .card-inner{display:grid; gap:1rem; padding:1rem}
    .card h2{margin:0; font-weight:500; letter-spacing:.02em}
    .row{display:grid; gap:.6rem}
    label{font-size:.9rem; color:var(--muted)}
    input[type="email"]{
      width:100%; padding:.85rem 1rem; border-radius:12px; border:1px solid rgba(255,255,255,.16);
      background:#0f0f0f; color:var(--fg); outline:none;
    }
    .actions{display:flex; gap:.6rem; justify-content:flex-end}
    .btn{appearance:none; border:1px solid rgba(255,255,255,.16); color:var(--fg); background:transparent; padding:.75rem 1rem; border-radius:999px; cursor:pointer}
    .btn.primary{border-color: rgba(214,198,139,.45); background: linear-gradient(180deg, rgba(214,198,139,.2), rgba(214,198,139,.08))}

    footer{position:fixed; left:0; right:0; bottom:8px; display:grid; place-items:center; pointer-events:none}
    .tag{pointer-events:auto; font-size:.78rem; color:var(--muted); background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.1); border-radius:999px; padding:.3rem .7rem}
  /* Effets de lumière subtils & mouvement lent */
    .g3{will-change:transform; animation:spin 120s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .light{position:absolute; inset:-10%; background:radial-gradient(700px 700px at 50% 50%, rgba(255,255,255,.06), transparent 60%), radial-gradient(900px 900px at 20% 80%, rgba(214,198,139,.045), transparent 65%); mix-blend-mode:screen; opacity:.06; pointer-events:none; animation:light-move 26s ease-in-out infinite alternate}
    @keyframes light-move{0%{transform:translate(-4%,2%)}50%{transform:translate(3%,-3%)}100%{transform:translate(6%,4%)}}
  /* Shelf actions (opaque, non-modal) */
    .shelf{position:fixed; left:0; right:0; bottom:0; transform:translateY(100%); background:#0b0b0b; border-top:1px solid rgba(255,255,255,.12); z-index:5; transition:transform .35s ease;}
    .shelf[data-open="1"]{ transform:translateY(0); }
    .shelf-inner{ max-width: 920px; margin: 0 auto; padding: 16px 20px 22px; position:relative; }
    .shelf-grid{ display:grid; grid-template-columns: 1fr auto; gap: 14px; align-items:end; }
    @media (max-width: 700px){ .shelf-grid{ grid-template-columns:1fr; } }
    .shelf-label{ font-size:.82rem; color:var(--muted); }
    .shelf-row{ display:flex; gap:8px; }
    .pill{ border:1px solid rgba(255,255,255,.22); background:#141414; color:var(--fg); border-radius:999px; padding:.7rem 1rem; cursor:pointer}
    .pill:hover{ border-color: rgba(214,198,139,.45); }
    .shelf-msg{ color:var(--muted); font-size:.9rem; margin:0; min-height:1.2em }
    .shelf-close{ position:absolute; right:16px; top:10px; appearance:none; background:transparent; border:1px solid rgba(255,255,255,.18); color:var(--fg); border-radius:999px; width:28px; height:28px; display:grid; place-items:center; cursor:pointer}

    .notch{ position:fixed; left:50%; bottom:6px; transform:translateX(-50%); width:38px; height:2px; background:rgba(255,255,255,.24); border-radius:999px; opacity:.7; z-index:4; animation: notchPulse 2.5s ease-in-out 3; }
    @keyframes notchPulse{ 0%,100%{opacity:.2} 50%{opacity:.9} }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bg grid">
      <div class="g1"></div>
      <div class="g2"></div>
      <div class="g3"></div>
      <div class="light"></div>
      <div class="noise" aria-hidden="true"></div>
    </div>

    <main class="wrap" role="main">
      <div class="count" aria-live="polite" aria-atomic="true">
        <span id="big"></span>
        <span class="unit">secondes</span>
      </div>
    </main>

    <div class="notch" id="notch" aria-hidden="true"></div>

    
    <footer>
      <div class="tag">#GalaEMD</div>
    </footer>
  </div>

  <div class="shelf" id="shelf" role="region" aria-label="Actions">
    <div class="shelf-inner">
      <button class="shelf-close" id="shelf-close" aria-label="Fermer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <div class="shelf-grid">
        <div class="shelf-block">
          <label for="email" class="shelf-label">Liste prioritaire</label>
          <div class="shelf-row">
            <input id="email" type="email" placeholder="ton.email@exemple.com" autocomplete="email" />
            <button class="pill" id="join">OK</button>
          </div>
          <p class="shelf-msg" id="msg"></p>
        </div>
        <div class="shelf-block">
          <label class="shelf-label">Agenda</label>
          <button class="pill" id="ics">Ajouter au calendrier</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TARGET_ISO = "2026-01-12T18:00:00+01:00"; // Date ajustée

    const EVENT_TITLE = "Gala EMD";
    const EVENT_LOCATION = "galaemd.fr";
    const EVENT_DESC = "Un moment unique. #GalaEMD";

    const fmt = new Intl.NumberFormat('fr-FR');
    const toICSDate = (d)=>{ const z = new Date(d); return z.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}Z$/, 'Z'); };

    const $big = document.getElementById('big');
    // removed fab
    // removed modal
    // removed close
    const $join = document.getElementById('join');
    const $ics = document.getElementById('ics');
    const $email = document.getElementById('email');
    const $msg = document.getElementById('msg');
    const $shelf = document.getElementById('shelf');
    const $shelfClose = document.getElementById('shelf-close');
    const $notch = document.getElementById('notch');

    const target = new Date(TARGET_ISO);

    function secondsLeft(){
      const now = Date.now();
      const diff = target.getTime() - now;
      return Math.max(0, Math.ceil(diff / 1000));
    }

    function render(){
      const s = secondsLeft();
      $big.textContent = fmt.format(s).replace(/\u00A0/g, '\u202F');
      if (s <= 0) {
        document.title = 'C\u2019est l\u2019heure';
        cancelAnimationFrame(ticker);
        return;
      }
      ticker = requestAnimationFrame(render);
    }

    let ticker = requestAnimationFrame(render);

    function openShelf(){ $shelf.setAttribute('data-open','1'); $email && $email.focus(); }
    function closeShelf(){ $shelf.removeAttribute('data-open'); }
    $shelfClose.addEventListener('click', closeShelf);
    $notch.addEventListener('click', openShelf);
    let pressTimer; const tapTarget = document.querySelector('.count');
    ['pointerdown','touchstart','mousedown'].forEach(ev=>tapTarget.addEventListener(ev, ()=>{ pressTimer=setTimeout(openShelf, 500); }));
    ['pointerup','touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>tapTarget.addEventListener(ev, ()=>{ clearTimeout(pressTimer); }));
    document.addEventListener('keydown', (e)=>{ if(e.key==='?' || (e.key.toLowerCase()==='k' && (e.ctrlKey||e.metaKey))){ openShelf(); } if(e.key==='Escape'){ closeShelf(); }});

    // shelf open via long-press, notch, or keyboard $email.focus(); });
    // handled by shelfClose button });
    // no modal overlay anymore }});

    $join.addEventListener('click', async ()=>{
      const v = ($email.value||'').trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){
        $msg.textContent = 'Entre un email valide.'; return;
      }
      $msg.textContent = 'Envoi…';
      try{
        await fetch('https://script.google.com/macros/s/AKfycbzaGnIrDFa_5Y8kNqD5XY5fHLgYyVLnTi75yQ0-yv2S63g_Xmybdl6DRGtzEowe7Hxp/exec', {
          method:'POST',
          mode:'no-cors',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({email:v})
        });
        $msg.textContent = 'Merci, tu es sur la liste prioritaire.';
        $email.value = '';
      }catch(err){
        console.error(err);
        $msg.textContent = 'Erreur, réessaie plus tard.';
      }
    });

    $ics.addEventListener('click', ()=>{
      const start = target;
      const end = new Date(start.getTime() + 30*60*1000);
      const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//GalaEMD//Countdown//FR',
        'BEGIN:VEVENT',
        `DTSTAMP:${toICSDate(new Date())}`,
        `DTSTART:${toICSDate(start)}`,
        `DTEND:${toICSDate(end)}`,
        'SUMMARY:' + EVENT_TITLE,
        'DESCRIPTION:' + EVENT_DESC,
        'LOCATION:' + EVENT_LOCATION,
        'END:VEVENT',
        'END:VCALENDAR' 
      ].join('\r\n');
      const blob = new Blob([ics], {type:'text/calendar'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'galaemd-reveal.ics'; a.click();
      URL.revokeObjectURL(url);
    });

    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden){ render(); }});
  </script>
</body>
</html>
